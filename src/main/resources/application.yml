spring:
  application:
    name: ECommerceAPI
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    url: jdbc:mysql://localhost:3306/mydatabase
    username: myuser
    password: secret
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: your-very-long-secret-key-for-hmac-signing
  expiration: 3600000
